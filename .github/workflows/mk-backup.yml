name: Encrypted MySQL backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
  repository_dispatch:
    types: [run-backup]

permissions:
  contents: write

concurrency:
  group: mysql-crypto-backup
  cancel-in-progress: false

env:
  # Required secrets:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

  # Required secret or repository variable.
  # This is the pinned SSH known_hosts entry for the backup server.
  # Secret takes priority over repository variable.
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS || vars.SSH_KNOWN_HOSTS }}

  # Optional secret or repository variable.
  # Secret takes priority over repository variable.
  SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
  BACKUP_USER: ${{ secrets.BACKUP_USER || vars.BACKUP_USER || 'backup' }}

  # Used only for release titles and asset names.
  BACKUP_NAME: ${{ vars.BACKUP_NAME || 'mysql' }}
  RELEASE_PREFIX: ${{ vars.RELEASE_PREFIX || 'mysql-backup' }}
  ASSET_PREFIX: ${{ vars.ASSET_PREFIX || 'mysql-backup' }}

  # Must be lower than GitHub's per-asset release limit.
  # Default is 2,000,000,000 bytes, safely below 2 GiB.
  SPLIT_SIZE_BYTES: ${{ vars.SPLIT_SIZE_BYTES || '2000000000' }}

  # GitHub currently allows up to 1000 assets per release.
  MAX_RELEASE_ASSETS: "1000"

jobs:
  backup:
    name: Create encrypted backup release
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Validate configuration
        shell: bash
        run: |
          set -euo pipefail

          require_value() {
            local name="$1"
            local value="${!name:-}"

            if [ -z "$value" ]; then
              echo "::error::Missing required value: $name"
              exit 1
            fi
          }

          require_value SSH_HOST
          require_value SSH_PRIVATE_KEY
          require_value SSH_KNOWN_HOSTS
          require_value MYSQL_PASSWORD
          require_value BACKUP_USER
          require_value BACKUP_NAME
          require_value RELEASE_PREFIX
          require_value ASSET_PREFIX
          require_value SPLIT_SIZE_BYTES
          require_value MAX_RELEASE_ASSETS

          case "$SSH_PORT" in
            ''|*[!0-9]*)
              echo "::error::SSH_PORT must be numeric"
              exit 1
              ;;
          esac

          case "$SPLIT_SIZE_BYTES" in
            ''|*[!0-9]*)
              echo "::error::SPLIT_SIZE_BYTES must be numeric"
              exit 1
              ;;
          esac

          case "$MAX_RELEASE_ASSETS" in
            ''|*[!0-9]*)
              echo "::error::MAX_RELEASE_ASSETS must be numeric"
              exit 1
              ;;
          esac

          if [ "$SPLIT_SIZE_BYTES" -le 0 ]; then
            echo "::error::SPLIT_SIZE_BYTES must be greater than zero"
            exit 1
          fi

          if [ "$SPLIT_SIZE_BYTES" -ge 2147483648 ]; then
            echo "::error::SPLIT_SIZE_BYTES must be lower than 2 GiB"
            exit 1
          fi

          if [ "$MAX_RELEASE_ASSETS" -le 2 ]; then
            echo "::error::MAX_RELEASE_ASSETS must be greater than 2 because manifest and checksum assets are also uploaded"
            exit 1
          fi

          echo "Configuration validated."
          echo "Backup user: $BACKUP_USER"
          echo "SSH port: $SSH_PORT"
          echo "SSH known_hosts pin: configured"
          echo "Backup name: $BACKUP_NAME"
          echo "Release prefix: $RELEASE_PREFIX"
          echo "Asset prefix: $ASSET_PREFIX"
          echo "Split size: $SPLIT_SIZE_BYTES bytes"
          echo "Max release assets: $MAX_RELEASE_ASSETS"

      - name: Verify GitHub Release permissions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          CHECK_TAG="${RELEASE_PREFIX}-permission-check-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RELEASE_CREATED=0

          cleanup_permission_check() {
            status="$?"

            if [ "$RELEASE_CREATED" -eq 1 ]; then
              gh release delete "$CHECK_TAG" \
                --yes \
                --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || true

              gh api \
                --method DELETE \
                "repos/$GITHUB_REPOSITORY/git/refs/tags/$CHECK_TAG" >/dev/null 2>&1 || true
            fi

            exit "$status"
          }

          trap cleanup_permission_check EXIT

          echo "Checking whether GITHUB_TOKEN can create GitHub Releases..."

          if ! gh release create "$CHECK_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Permission check $CHECK_TAG" \
            --notes "Temporary release used to verify GitHub Actions release permissions." \
            --target "$GITHUB_SHA" \
            --draft \
            --latest=false; then

            echo "::error::GITHUB_TOKEN cannot create GitHub Releases for this repository."
            echo "::error::Check repository Settings -> Actions -> General -> Workflow permissions and allow read/write permissions."
            exit 1
          fi

          RELEASE_CREATED=1

          gh release delete "$CHECK_TAG" \
            --yes \
            --repo "$GITHUB_REPOSITORY" >/dev/null

          gh api \
            --method DELETE \
            "repos/$GITHUB_REPOSITORY/git/refs/tags/$CHECK_TAG" >/dev/null 2>&1 || true

          RELEASE_CREATED=0

          echo "GitHub Release permissions verified."

      - name: Create encrypted backup assets
        id: backup
        shell: bash
        run: |
          set -Eeuo pipefail

          STAMP="$(date -u '+%Y%m%dT%H%M%SZ')"

          WORKDIR="$RUNNER_TEMP/mysql-crypto-backup"
          SSH_DIR="$WORKDIR/ssh"
          PARTS_DIR="$WORKDIR/parts"
          ASSET_DIR="$WORKDIR/assets"

          mkdir -p "$SSH_DIR" "$PARTS_DIR" "$ASSET_DIR"
          chmod 700 "$SSH_DIR"

          SSH_KEY_FILE="$SSH_DIR/id_ed25519_backup"
          KNOWN_HOSTS_FILE="$SSH_DIR/known_hosts"

          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$SSH_KEY_FILE"
          chmod 600 "$SSH_KEY_FILE"

          echo "::group::SSH host pinning"
          echo "Installing pinned SSH known_hosts entry..."

          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > "$KNOWN_HOSTS_FILE"
          chmod 600 "$KNOWN_HOSTS_FILE"

          if ! ssh-keygen -l -f "$KNOWN_HOSTS_FILE" >/dev/null 2>&1; then
            echo "::endgroup::"
            echo "::error::SSH_KNOWN_HOSTS does not look like a valid known_hosts file"
            exit 1
          fi

          echo "Pinned SSH known_hosts file installed."
          echo "StrictHostKeyChecking is enabled."
          echo "::endgroup::"

          TAG="${RELEASE_PREFIX}-${STAMP}"
          RELEASE_TITLE="${BACKUP_NAME} backup ${STAMP}"
          BACKUP_FILE="${ASSET_PREFIX}-${STAMP}.age"
          PART_PREFIX="$PARTS_DIR/${BACKUP_FILE}.part-"

          echo "::group::Backup plan"
          echo "Timestamp: $STAMP"
          echo "Release tag: $TAG"
          echo "Release title: $RELEASE_TITLE"
          echo "Encrypted backup filename: $BACKUP_FILE"
          echo "Split output prefix: $PART_PREFIX"
          echo "Split size: $SPLIT_SIZE_BYTES bytes"
          echo "Runner temporary directory: $RUNNER_TEMP"
          echo "Runner free space before backup:"
          df -h "$RUNNER_TEMP"
          echo "::endgroup::"

          echo "::group::Encrypted backup stream"
          echo "Starting encrypted backup stream..."
          echo "Receiving encrypted stream from backup server."
          echo "Progress below is measured after server-side age encryption."

          if ! printf '%s\n' "$MYSQL_PASSWORD" \
            | ssh \
                -T \
                -p "$SSH_PORT" \
                -i "$SSH_KEY_FILE" \
                -o BatchMode=yes \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile="$KNOWN_HOSTS_FILE" \
                "${BACKUP_USER}@${SSH_HOST}" \
                -- mysql-crypto-backup \
            | dd bs=16M status=progress \
            | split -d -a 4 -b "$SPLIT_SIZE_BYTES" - "$PART_PREFIX"; then

            echo "::endgroup::"
            echo "::error::Backup stream failed. The server command may have failed, SSH may have failed, or the runner disk may be full."
            echo "Runner free space after failure:"
            df -h "$RUNNER_TEMP"
            exit 1
          fi

          echo "Encrypted backup stream completed."
          echo "::endgroup::"

          PART_COUNT="$(find "$PARTS_DIR" -maxdepth 1 -type f -name "${BACKUP_FILE}.part-*" | wc -l | tr -d ' ')"

          echo "::group::Split output"
          echo "Split output parts: $PART_COUNT"
          echo "Split size limit: $SPLIT_SIZE_BYTES bytes"
          find "$PARTS_DIR" -maxdepth 1 -type f -name "${BACKUP_FILE}.part-*" -printf '%f %s bytes\n' | sort
          echo "::endgroup::"

          if [ "$PART_COUNT" -eq 0 ]; then
            echo "::error::Backup stream produced no output"
            exit 1
          fi

          echo "::group::Asset preparation"

          if [ "$PART_COUNT" -eq 1 ]; then
            MODE="single-file"
            ONLY_PART="$(find "$PARTS_DIR" -maxdepth 1 -type f -name "${BACKUP_FILE}.part-*")"
            mv "$ONLY_PART" "$ASSET_DIR/$BACKUP_FILE"
            UPLOAD_ASSET_COUNT=3

            echo "Backup mode: single-file"
            echo "The only split part was renamed to: $BACKUP_FILE"
          else
            MODE="split"
            while IFS= read -r -d '' part; do
              mv "$part" "$ASSET_DIR/$(basename "$part")"
            done < <(find "$PARTS_DIR" -maxdepth 1 -type f -name "${BACKUP_FILE}.part-*" -print0 | sort -z)

            UPLOAD_ASSET_COUNT="$((PART_COUNT + 2))"

            echo "Backup mode: split"
            echo "Backup parts moved to asset directory."
          fi

          echo "Planned release assets: $UPLOAD_ASSET_COUNT"
          echo "Backup parts: $PART_COUNT"
          echo "Metadata assets: 2"
          echo "::endgroup::"

          if [ "$UPLOAD_ASSET_COUNT" -gt "$MAX_RELEASE_ASSETS" ]; then
            echo "::error::Backup requires $UPLOAD_ASSET_COUNT release assets, but the configured single-release limit is $MAX_RELEASE_ASSETS"
            echo "::error::This workflow does not split one backup across multiple GitHub Releases"
            exit 1
          fi

          echo "::group::Size and checksum"

          if [ "$MODE" = "single-file" ]; then
            TOTAL_SIZE_BYTES="$(stat -c '%s' "$ASSET_DIR/$BACKUP_FILE")"
            ORIGINAL_SHA256="$(sha256sum "$ASSET_DIR/$BACKUP_FILE" | awk '{print $1}')"
          else
            TOTAL_SIZE_BYTES="$(find "$ASSET_DIR" -maxdepth 1 -type f -name "${BACKUP_FILE}.part-*" -printf '%s\n' | awk '{s += $1} END {print s + 0}')"
            ORIGINAL_SHA256="$(cat "$ASSET_DIR"/"${BACKUP_FILE}".part-* | sha256sum | awk '{print $1}')"
          fi

          echo "Encrypted size: $TOTAL_SIZE_BYTES bytes"
          echo "SHA256 of assembled encrypted backup: $ORIGINAL_SHA256"
          echo "::endgroup::"

          MANIFEST_NAME="${ASSET_PREFIX}-${STAMP}.manifest.json"
          CHECKSUMS_NAME="${ASSET_PREFIX}-${STAMP}.sha256"
          MANIFEST_PATH="$ASSET_DIR/$MANIFEST_NAME"
          CHECKSUMS_PATH="$ASSET_DIR/$CHECKSUMS_NAME"
          NOTES_PATH="$WORKDIR/release-notes.md"

          export ASSET_DIR
          export MANIFEST_PATH
          export MODE
          export STAMP
          export TAG
          export BACKUP_NAME
          export BACKUP_FILE
          export SPLIT_SIZE_BYTES
          export TOTAL_SIZE_BYTES
          export ORIGINAL_SHA256
          export PART_COUNT
          export MANIFEST_NAME
          export CHECKSUMS_NAME

          echo "::group::Manifest and checksums"
          echo "Creating manifest: $MANIFEST_NAME"
          echo "Creating release notes."

          export NOTES_PATH

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          asset_dir = Path(os.environ["ASSET_DIR"])

          backup_assets = sorted(
              p.name
              for p in asset_dir.iterdir()
              if p.is_file()
          )

          mode = os.environ["MODE"]
          backup_file = os.environ["BACKUP_FILE"]
          backup_name = os.environ["BACKUP_NAME"]
          stamp = os.environ["STAMP"]
          total_size_bytes = os.environ["TOTAL_SIZE_BYTES"]
          original_sha256 = os.environ["ORIGINAL_SHA256"]
          manifest_name = os.environ["MANIFEST_NAME"]
          checksums_name = os.environ["CHECKSUMS_NAME"]
          part_count = os.environ["PART_COUNT"]

          manifest = {
              "schema": "mysql-crypto-backup-manifest/v1",
              "created_at_utc": stamp,
              "tag": os.environ["TAG"],
              "backup_name": backup_name,
              "mode": mode,
              "encrypted_backup": {
                  "assembled_filename": backup_file,
                  "size_bytes": int(total_size_bytes),
                  "sha256": original_sha256,
                  "split_size_bytes": (
                      int(os.environ["SPLIT_SIZE_BYTES"])
                      if mode == "split"
                      else None
                  ),
                  "part_count": int(part_count),
                  "assets": backup_assets
              },
              "metadata_assets": {
                  "manifest": manifest_name,
                  "checksums": checksums_name
              },
              "notes": {
                  "decrypted_output": "The decrypted file is the exact output of the server-side PROCESS_COMMAND.",
                  "processing_command_is_user_configurable": True
              }
          }

          with open(os.environ["MANIFEST_PATH"], "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          if mode == "single-file":
              notes_lines = [
                  "# Encrypted MySQL backup",
                  "",
                  f"* Backup name: `{backup_name}`",
                  f"* Created at: `{stamp}` UTC",
                  "* Mode: `single-file`",
                  f"* Encrypted backup asset: `{backup_file}`",
                  f"* Encrypted size: `{total_size_bytes}` bytes",
                  f"* SHA256 of encrypted backup: `{original_sha256}`",
                  f"* Manifest: `{manifest_name}`",
                  f"* Checksums: `{checksums_name}`",
                  "",
                  "## Restore",
                  "",
                  "Download these release assets into the same directory:",
                  "",
                  f"* `{backup_file}`",
                  f"* `{manifest_name}`",
                  f"* `{checksums_name}`",
                  "",
                  "Verify downloaded assets:",
                  "",
                  "```sh",
                  f"sha256sum -c {checksums_name}",
                  "```",
                  "",
                  "Verify the encrypted backup file:",
                  "",
                  "```sh",
                  f"printf '%s  %s\\n' '{original_sha256}' '{backup_file}' | sha256sum -c -",
                  "```",
                  "",
                  "Decrypt the encrypted backup:",
                  "",
                  "```sh",
                  f"age -d -i backup-key.txt < {backup_file} > backup.processed",
                  "```",
                  "",
                  "The decrypted `backup.processed` file is the exact stream that was encrypted on the server.",
                  "",
                  "If `PROCESS_COMMAND` was empty during setup, `backup.processed` is already a SQL dump:",
                  "",
                  "```sh",
                  "mv backup.processed backup.sql",
                  "```",
                  "",
                  "If you used compression, reverse that processing step first. For example, if you configured `PROCESS_COMMAND='zstd -19'`, decompress it with:",
                  "",
                  "```sh",
                  "zstd -d -c backup.processed > backup.sql",
                  "```",
                  "",
                  "Then inspect and restore the SQL dump according to your MySQL restore procedure. With the default dump command, the dump is created with `mysqldump --databases`, so it contains database-selection statements.",
              ]
          else:
              notes_lines = [
                  "# Encrypted MySQL backup",
                  "",
                  f"* Backup name: `{backup_name}`",
                  f"* Created at: `{stamp}` UTC",
                  "* Mode: `split`",
                  f"* Encrypted backup filename after assembly: `{backup_file}`",
                  f"* Part count: `{part_count}`",
                  f"* Encrypted size after assembly: `{total_size_bytes}` bytes",
                  f"* SHA256 of assembled encrypted backup: `{original_sha256}`",
                  f"* Manifest: `{manifest_name}`",
                  f"* Checksums: `{checksums_name}`",
                  "",
                  "## Restore",
                  "",
                  f"Download all `{backup_file}.part-*` assets, plus:",
                  "",
                  f"* `{manifest_name}`",
                  f"* `{checksums_name}`",
                  "",
                  "Verify downloaded assets:",
                  "",
                  "```sh",
                  f"sha256sum -c {checksums_name}",
                  "```",
                  "",
                  "Reassemble the encrypted backup:",
                  "",
                  "```sh",
                  f"cat {backup_file}.part-* > {backup_file}",
                  "```",
                  "",
                  "Verify the assembled encrypted backup:",
                  "",
                  "```sh",
                  f"printf '%s  %s\\n' '{original_sha256}' '{backup_file}' | sha256sum -c -",
                  "```",
                  "",
                  "Decrypt the encrypted backup:",
                  "",
                  "```sh",
                  f"age -d -i backup-key.txt < {backup_file} > backup.processed",
                  "```",
                  "",
                  "The decrypted `backup.processed` file is the exact stream that was encrypted on the server.",
                  "",
                  "If `PROCESS_COMMAND` was empty during setup, `backup.processed` is already a SQL dump:",
                  "",
                  "```sh",
                  "mv backup.processed backup.sql",
                  "```",
                  "",
                  "If you used compression, reverse that processing step first. For example, if you configured `PROCESS_COMMAND='zstd -19'`, decompress it with:",
                  "",
                  "```sh",
                  "zstd -d -c backup.processed > backup.sql",
                  "```",
                  "",
                  "Then inspect and restore the SQL dump according to your MySQL restore procedure. With the default dump command, the dump is created with `mysqldump --databases`, so it contains database-selection statements.",
              ]

          notes = "\n".join(notes_lines) + "\n"
          Path(os.environ["NOTES_PATH"]).write_text(notes, encoding="utf-8")
          PY

          TMP_CHECKSUMS="$WORKDIR/checksums.tmp"

          echo "Creating checksums: $CHECKSUMS_NAME"

          (
            cd "$ASSET_DIR"
            find . -maxdepth 1 -type f -printf '%f\n' \
              | sort \
              | while IFS= read -r file; do
                  sha256sum "$file"
                done
          ) > "$TMP_CHECKSUMS"

          mv "$TMP_CHECKSUMS" "$CHECKSUMS_PATH"

          echo "Manifest, checksums, and release notes created."
          echo "::endgroup::"

          FINAL_ASSET_COUNT="$(find "$ASSET_DIR" -maxdepth 1 -type f | wc -l | tr -d ' ')"

          if [ "$FINAL_ASSET_COUNT" -gt "$MAX_RELEASE_ASSETS" ]; then
            echo "::error::Prepared $FINAL_ASSET_COUNT assets, but the configured single-release limit is $MAX_RELEASE_ASSETS"
            exit 1
          fi

          echo "::group::Prepared assets"
          echo "Final release asset count: $FINAL_ASSET_COUNT"
          find "$ASSET_DIR" -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
          echo "Runner free space after asset preparation:"
          df -h "$RUNNER_TEMP"
          echo "::endgroup::"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "part_count=$PART_COUNT" >> "$GITHUB_OUTPUT"
          echo "asset_count=$FINAL_ASSET_COUNT" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$TOTAL_SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "sha256=$ORIGINAL_SHA256" >> "$GITHUB_OUTPUT"
          echo "asset_dir=$ASSET_DIR" >> "$GITHUB_OUTPUT"
          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.backup.outputs.tag }}
          TITLE: ${{ steps.backup.outputs.title }}
          ASSET_DIR: ${{ steps.backup.outputs.asset_dir }}
          NOTES_PATH: ${{ steps.backup.outputs.notes_path }}
        run: |
          set -Eeuo pipefail

          RELEASE_CREATED=0
          RELEASE_PUBLISHED=0

          cleanup_incomplete_release() {
            status="$?"

            if [ "$status" -ne 0 ] && [ "$RELEASE_CREATED" -eq 1 ] && [ "$RELEASE_PUBLISHED" -eq 0 ]; then
              echo "::warning::Deleting incomplete draft release $TAG"
              gh release delete "$TAG" \
                --yes \
                --repo "$GITHUB_REPOSITORY" || true

              gh api \
                --method DELETE \
                "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1 || true
            fi
          }

          trap cleanup_incomplete_release EXIT

          echo "::group::Create draft release"
          echo "Creating draft release: $TAG"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes-file "$NOTES_PATH" \
            --target "$GITHUB_SHA" \
            --draft \
            --latest=false
          echo "Draft release created."
          echo "::endgroup::"

          RELEASE_CREATED=1

          echo "::group::Upload release assets"
          while IFS= read -r -d '' asset; do
            echo "Uploading $(basename "$asset")"
            gh release upload "$TAG" "$asset" \
              --repo "$GITHUB_REPOSITORY"
          done < <(find "$ASSET_DIR" -maxdepth 1 -type f -print0 | sort -z)
          echo "All release assets uploaded."
          echo "::endgroup::"

          echo "::group::Publish release"
          echo "Publishing release: $TAG"
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest=false
          echo "Release published."
          echo "::endgroup::"

          RELEASE_PUBLISHED=1

      - name: Write workflow summary
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Encrypted MySQL backup"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Release tag | \`${{ steps.backup.outputs.tag }}\` |"
            echo "| Mode | \`${{ steps.backup.outputs.mode }}\` |"
            echo "| Part count | \`${{ steps.backup.outputs.part_count }}\` |"
            echo "| Uploaded assets | \`${{ steps.backup.outputs.asset_count }}\` |"
            echo "| Encrypted size | \`${{ steps.backup.outputs.size_bytes }}\` bytes |"
            echo "| SHA256 | \`${{ steps.backup.outputs.sha256 }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
